name: Render USAGE

on:
  push:
    branches: [main]
    paths:
      - "USAGE.qmd"
      - "_quarto.yml"
      - "kalshi_trades/**"
      - ".github/workflows/render-usage.yml"
  pull_request:
    paths:
      - "USAGE.qmd"
      - "_quarto.yml"
      - "kalshi_trades/**"

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install package
        run: uv pip install -e . --system

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render USAGE.qmd → USAGE.md
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: quarto render USAGE.qmd

      - name: Commit rendered USAGE.md
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add USAGE.md
          git diff --cached --quiet || git commit -m "docs: re-render USAGE.md [skip ci]"
          git push
